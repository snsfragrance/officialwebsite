    <article class="card" data-category="tranquilty">
      <img src="https://down-id.img.susercontent.com/file/id-11134207-7r98r-ly8a3oyt10y075" />
      <div class="card-content">
        <h2>TRANQUILITY</h2>
        <p class="brand">MEMORIES</p>
        <p>TOP NOTES: Mandarin Orange Blossom</p>
        <p>MIDDLE NOTES: Tuberose, Ylang Ylang</p>
        <p>BASE NOTES: Musk, Vanilla, Sandalwood</p>
      </div>
    </article>
  </main>
  <footer>
    &mdash; <span>SNS Fragrance</span> &mdash;
  </footer>
  <script>
    const filterButtons = document.querySelectorAll('.filter-btn');
    const cards = document.querySelectorAll('.card');
    filterButtons.forEach(button => {
      button.addEventListener('click', () => {
        filterButtons.forEach(btn => {
          btn.classList.remove('active');
          btn.setAttribute('aria-pressed', 'false');
        });
        button.classList.add('active');
        button.setAttribute('aria-pressed', 'true');
        const filter = button.getAttribute('data-filter');
        cards.forEach(card => {
          if (filter === 'all' || card.getAttribute('data-category') === filter) {
            card.style.display = 'flex';
          } else {
            card.style.display = 'none';
          }
        });
      });
    });
  </script>
</body>
</html>
